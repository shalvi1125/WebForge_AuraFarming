<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Raahi - Discover India's Hidden Heritage" />
    <meta property="og:description" content="Immersive exploration of India's lost heritage sites through interactive maps and AI guidance" />
    <meta property="og:type" content="website" />
    <meta property="og:author" content="Raahi" />
    <meta property="og:site_name" content="Raahi" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:site" content="@raahiapp" />
    <meta property="twitter:title" content="Raahi - Discover India's Hidden Heritage" />
    <meta property="twitter:description" content="Immersive exploration of India's lost heritage sites through interactive maps and AI guidance" />
    <title>Raahi - Discover India's Hidden Heritage</title>
    
    <!-- Google Translate Script -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,bn,te,mr,ta,ur,gu,kn,or,pa,as,ml',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
      /* Make Google Translate more compact */
      .goog-te-gadget-simple {
        background-color: white !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 6px !important;
        padding: 6px 8px !important;
        font-size: 13px !important;
        line-height: 1.2 !important;
        box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.1) !important;
      }
      
      .goog-te-gadget-simple .goog-te-menu-value span:first-child {
        color: #374151 !important;
        font-weight: 500 !important;
      }
      
      /* Hide Google branding */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-gadget-icon {
        display: none !important;
      }
      
      body {
        top: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Google Translate Element (positioned higher and more compact) -->
    <div id="google_translate_element" style="display: none; position: fixed; top: 20px; right: 20px; z-index: 1000;"></div>
    
    <script type="module" src="/src/react-app/main.tsx"></script>
  </body>
</html>
