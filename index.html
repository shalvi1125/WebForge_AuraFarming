<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="HostelIQ – AI Powered Hostel Management" />
    <meta property="og:description" content="Modern hostel management for students, wardens, admins, and visitors — room allocation, complaints, leave, fees, and AI insights in one platform." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HostelIQ" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="HostelIQ – AI Powered Hostel Management" />
    <meta property="twitter:description" content="Smart hostel operations with AI-powered room allocation, complaint management, and real-time analytics." />
    <title>HostelIQ – AI Powered Hostel Management System</title>
    
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,bn,te,mr,ta,ur,gu,kn,or,pa,as,ml',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
      /* Widget container — toggled by TranslateButton via .is-open class */
      #google_translate_element {
        position: fixed !important;
        top: 56px !important;
        right: 20px !important;
        z-index: 9999 !important;
        opacity: 0;
        pointer-events: none;
        height: 0;
        overflow: visible;
      }
      #google_translate_element.is-open {
        opacity: 1;
        pointer-events: auto;
        height: auto;
      }
      #google_translate_element .goog-te-gadget {
        font-family: inherit !important;
        color: transparent !important;
      }
      .goog-te-gadget-simple {
        background-color: white !important;
        border: 1px solid rgba(7, 27, 52, 0.15) !important;
        border-radius: 8px !important;
        padding: 8px 12px !important;
        font-size: 13px !important;
        line-height: 1.4 !important;
        box-shadow: 0 4px 20px rgba(7, 27, 52, 0.15) !important;
        cursor: pointer !important;
      }
      .goog-te-gadget-simple a,
      .goog-te-gadget-simple a span {
        color: #071B34 !important;
        font-weight: 500 !important;
        text-decoration: none !important;
      }
      .goog-te-gadget-icon {
        display: none !important;
      }
      /* Hide top banner only — DO NOT hide all .skiptranslate (breaks language menu) */
      .goog-te-banner-frame,
      iframe.goog-te-banner-frame {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
      }
      body {
        top: 0 !important;
        position: static !important;
      }
      /* Language dropdown menu — must remain visible (iframe + legacy markup) */
      iframe.VIpgJd-ZVi9od-xl07Ob-OEVmcd,
      .goog-te-menu-frame {
        z-index: 100001 !important;
        box-shadow: 0 8px 32px rgba(7, 27, 52, 0.18) !important;
        pointer-events: auto !important;
      }
      .goog-te-menu2 {
        background: #ffffff !important;
        border: 1px solid rgba(7, 27, 52, 0.12) !important;
        max-height: 320px !important;
        overflow-y: auto !important;
        padding: 4px 0 !important;
      }
      .goog-te-menu2-item div,
      .goog-te-menu2-item:link div,
      .goog-te-menu2-item:visited div,
      .goog-te-menu2-item:active div {
        color: #071B34 !important;
        font-size: 13px !important;
        padding: 6px 14px !important;
      }
      .goog-te-menu2-item:hover {
        background: #F5F7FA !important;
      }
      /* Prevent Google from shifting page down */
      .skiptranslate iframe.goog-te-banner-frame {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element"></div>
    <script type="module" src="/src/react-app/main.tsx"></script>
  </body>
</html>
