<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="HostelIQ – AI Powered Hostel Management" />
    <meta property="og:description" content="Modern hostel management for students, wardens, admins, and visitors — room allocation, complaints, leave, fees, and AI insights in one platform." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HostelIQ" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="HostelIQ – AI Powered Hostel Management" />
    <meta property="twitter:description" content="Smart hostel operations with AI-powered room allocation, complaint management, and real-time analytics." />
    <title>HostelIQ – AI Powered Hostel Management System</title>
    
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,bn,te,mr,ta,ur,gu,kn,or,pa,as,ml',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
      #google_translate_element {
        position: fixed !important;
        top: 56px !important;
        right: 20px !important;
        z-index: 9999 !important;
        display: none;
        visibility: hidden;
        pointer-events: none;
      }
      #google_translate_element .goog-te-gadget {
        font-family: inherit !important;
      }
      .goog-te-gadget-simple {
        background-color: white !important;
        border: 1px solid rgba(7, 27, 52, 0.12) !important;
        border-radius: 8px !important;
        padding: 8px 12px !important;
        font-size: 13px !important;
        line-height: 1.2 !important;
        box-shadow: 0 4px 16px rgba(7, 27, 52, 0.12) !important;
      }
      .goog-te-gadget-simple .goog-te-menu-value span:first-child {
        color: #071B34 !important;
        font-weight: 500 !important;
      }
      .goog-te-gadget-simple .goog-te-menu-value span {
        color: #4A5568 !important;
      }
      .goog-te-banner-frame.skiptranslate,
      .goog-te-gadget-icon,
      .skiptranslate.goog-te-banner-frame {
        display: none !important;
      }
      body { top: 0 !important; }
      body > .skiptranslate {
        display: none !important;
      }
      iframe.goog-te-banner-frame {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element"></div>
    <script type="module" src="/src/react-app/main.tsx"></script>
  </body>
</html>
